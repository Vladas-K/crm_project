{% extends "base.html" %}

{% block title %}Удаление | CRM{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="h2 mb-1">Удаление объекта</h1>
        <p class="text-secondary mb-0">Подтвердите удаление записи.</p>
    </div>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">Назад</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <p class="mb-4">Вы уверены, что хотите удалить: <strong>{{ object }}</strong>?</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
